{{ $posts := where .Site.RegularPages "Params.source" "reddit" }}
{{ $posts = first 5 $posts.ByDate.Reverse }}

{{ if $posts }}
  {{ range $posts }}
    <div style="background:#2a0a4a; border:1px solid #d4af37; border-radius:8px; padding:15px; margin:10px 0;">
      <h4 style="margin:0 0 5px 0; color:#d4a017;">
        <a href="{{ .RelPermalink }}" style="color:#d4a017; text-decoration:none;">{{ .Title }}</a>
      </h4>
      <p style="color:#8b949e; font-size:0.85em; margin:0;">
        {{ .Date.Format "02/01/2006" }} •
        <a href="{{ .Params.source_url }}" style="color:#ff4500;" target="_blank">Leggi il post</a> <img src="/images/rss.png" width="16px">
      </p>
    </div>
  {{ end }}
{{ else }}
  <p style="color:#8b949e;">Nessuna notizia al momento. Torna presto!</p>
{{ end }}
