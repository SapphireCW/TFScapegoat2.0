{{ define "main" }}
  <center><img src="/images/logo.png" width="240px"></center>
  {{ .Content }}
  
  <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:20px; margin:30px 0;">
  {{ range .Pages.ByWeight }}
    <a href="{{ .RelPermalink }}" style="text-decoration:none; background:#5e2b97; border:1px solid #30363d; border-radius:12px; padding:30px; text-align:center; transition:all 0.3s; display:block;" onmouseover="this.style.borderColor='#d4af37'; this.style.background='#d4af37'; this.querySelector('h2').style.color='#000'; this.querySelector('p').style.color='#000';" onmouseout="this.style.borderColor='#30363d'; this.style.background='#5e2b97'; this.querySelector('h2').style.color='#FFF'; this.querySelector('p').style.color='#FFF';">
      
      <div style="font-size:3em; margin-bottom:15px;">
        {{ if .Params.icon }}{{ .Params.icon }}{{ else }}📄{{ end }}
      </div>
      
      <h2 style="color: white; margin:0 0 10px 0; font-size:1.2em;">{{ .Title }}</h2>
      
      {{ if .Description }}
        <p style="color:white; margin:0; font-size:0.9em;">{{ .Description }}</p>
      {{ end }}
      
    </a>
  {{ end }}
</div>

{{ end }}
